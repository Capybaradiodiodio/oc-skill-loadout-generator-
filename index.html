<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>OC Skill Builder</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f14;
  color: white;
}

/* ---------- Page Control ---------- */

.hidden { display: none; }

/* ---------- Layout ---------- */

.builderLayout {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.container {
  display: flex;
  flex: 1;
}

.mainArea {
  flex: 3;
  padding: 30px;
}

.sidePanel {
  flex: 1;
  background: #1a1a22;
  padding: 20px;
  border-left: 2px solid #333;
}

/* ---------- Bottom Skill Bar ---------- */

#bottomSkillBar {
  background: #14141c;
  border-top: 2px solid #333;
  padding: 10px;
  min-height: 90px;
  overflow-x: auto;
}

#skillBar {
  display: flex;
  gap: 10px;
}

.selectedSkill {
  background: #2a2a35;
  padding: 6px 10px;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-radius: 4px;
}

/* ---------- Buttons ---------- */

button {
  padding: 8px 12px;
  margin: 5px;
  background: #333;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #555;
}

/* ---------- Skills ---------- */

.skill {
  padding: 10px;
  margin: 6px 0;
  background: #222;
  cursor: pointer;
}

.skill:hover {
  background: #333;
}

/* ---------- Cost Bar ---------- */

#costBarContainer {
  background: #333;
  height: 15px;
  width: 100%;
  margin-top: 10px;
}

#costBar {
  height: 15px;
  background: #00ffaa;
  width: 0%;
}
</style>
</head>

<body>

<!-- ================= INTRO PAGE ================= -->
<div id="introPage">
  <div style="text-align:center; margin-top:20%;">
    <h1>OC Skill Generator</h1>
    <button onclick="showPage('elementPage')">Start</button>
  </div>
</div>

<!-- ================= ELEMENT PAGE ================= -->
<div id="elementPage" class="hidden">
  <div style="text-align:center; margin-top:20%;">
    <h2>Select Your Core Element</h2>
    <button onclick="chooseElement('fire')">Fire</button>
    <button onclick="chooseElement('water')">Water</button>
    <button onclick="chooseElement('wind')">Wind</button>
    <br><br>
    <button onclick="showPage('introPage')">Back</button>
  </div>
</div>

<!-- ================= BUILDER PAGE ================= -->
<div id="builderPage" class="hidden">
  <div class="builderLayout">

    <div class="container">

      <div class="mainArea">
        <h2 id="elementTitle"></h2>
        <div id="skillsContainer"></div>
        <br>
        <button onclick="showPage('elementPage')">Change Element</button>
      </div>

      <div class="sidePanel">
        <h3>Skill Details</h3>
        <div id="skillDetails">Hover over a skill</div>

        <hr>

        <h3>Stats</h3>
        <canvas id="radarChart" width="250" height="250"></canvas>

        <hr>

        <div id="costDisplay">Points: 0 / 10</div>
        <div id="costBarContainer">
          <div id="costBar"></div>
        </div>
      </div>

    </div>

    <div id="bottomSkillBar">
      <h3>Your Loadout</h3>
      <div id="skillBar"></div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
let selectedElement = null;
let selectedSkills = [];
let totalCost = 0;
let maxPoints = 10;
let radarChart;

/* ---------- DATA ---------- */

const elements = {
  fire: {
    skills: [
      { name: "Fire 1", cost: 2, type: "AoE", stats: {attack:4, defense:1, control:1, sustain:0}},
      { name: "Fire 2", cost: 3, type: "Burst", stats: {attack:5, defense:0, control:1, sustain:0}},
      { name: "Fire 3", cost: 4, type: "Explosion", stats: {attack:6, defense:1, control:2, sustain:0}}
    ]
  },
  water: {
    skills: [
      { name: "Water 1", cost: 2, type: "Control", stats: {attack:2, defense:1, control:4, sustain:1}},
      { name: "Water 2", cost: 3, type: "Shield", stats: {attack:1, defense:4, control:2, sustain:2}},
      { name: "Water 3", cost: 4, type: "Wave", stats: {attack:3, defense:2, control:5, sustain:1}}
    ]
  },
  wind: {
    skills: [
      { name: "Wind 1", cost: 2, type: "Mobility", stats: {attack:2, defense:1, control:2, sustain:0}},
      { name: "Wind 2", cost: 3, type: "Slice", stats: {attack:4, defense:1, control:2, sustain:0}},
      { name: "Wind 3", cost: 4, type: "Storm", stats: {attack:3, defense:2, control:5, sustain:0}}
    ]
  }
};

/* ---------- PAGE CONTROL ---------- */

function showPage(pageId) {
  document.getElementById("introPage").classList.add("hidden");
  document.getElementById("elementPage").classList.add("hidden");
  document.getElementById("builderPage").classList.add("hidden");
  document.getElementById(pageId).classList.remove("hidden");
}

/* ---------- ELEMENT SELECTION ---------- */

function chooseElement(element) {
  selectedElement = element;
  document.getElementById("elementTitle").innerText =
    element.toUpperCase() + " Skills";
  renderSkills();
  showPage("builderPage");
}

/* ---------- RENDER SKILLS ---------- */

function renderSkills() {
  const container = document.getElementById("skillsContainer");
  container.innerHTML = "";

  elements[selectedElement].skills.forEach(skill => {
    const div = document.createElement("div");
    div.className = "skill";
    div.innerText = skill.name + " (Cost: " + skill.cost + ")";
    div.onclick = () => addSkill(skill);
    div.onmouseenter = () => showSkillDetails(skill);
    container.appendChild(div);
  });
}

/* ---------- ADD / REMOVE SKILLS ---------- */

function addSkill(skill) {
  if (selectedSkills.includes(skill)) {
    alert("Skill already selected!");
    return;
  }

  if (totalCost + skill.cost > maxPoints) {
    alert("Not enough points!");
    return;
  }

  selectedSkills.push(skill);
  totalCost += skill.cost;
  updateSkillBar();
  updateStats();
}

function removeSkill(index) {
  totalCost -= selectedSkills[index].cost;
  selectedSkills.splice(index, 1);
  updateSkillBar();
  updateStats();
}

/* ---------- UPDATE UI ---------- */

function updateSkillBar() {
  const bar = document.getElementById("skillBar");
  bar.innerHTML = "";

  selectedSkills.forEach((skill, index) => {
    const div = document.createElement("div");
    div.className = "selectedSkill";
    div.innerHTML = `
      ${skill.name}
      <button onclick="removeSkill(${index})">X</button>
    `;
    bar.appendChild(div);
  });

  document.getElementById("costDisplay").innerText =
    "Points: " + totalCost + " / " + maxPoints;

  document.getElementById("costBar").style.width =
    (totalCost / maxPoints * 100) + "%";
}

function showSkillDetails(skill) {
  document.getElementById("skillDetails").innerHTML = `
    <strong>${skill.name}</strong><br>
    Type: ${skill.type}<br>
    Cost: ${skill.cost}<br>
    Attack: ${skill.stats.attack}<br>
    Defense: ${skill.stats.defense}<br>
    Control: ${skill.stats.control}<br>
    Sustain: ${skill.stats.sustain}
  `;
}

function updateStats() {
  let totals = {attack:0, defense:0, control:0, sustain:0};

  selectedSkills.forEach(skill => {
    totals.attack += skill.stats.attack;
    totals.defense += skill.stats.defense;
    totals.control += skill.stats.control;
    totals.sustain += skill.stats.sustain;
  });

  if (radarChart) radarChart.destroy();

  radarChart = new Chart(document.getElementById("radarChart"), {
    type: "radar",
    data: {
      labels: ["Attack","Defense","Control","Sustain"],
      datasets: [{
        label: "Build Stats",
        data: [totals.attack, totals.defense, totals.control, totals.sustain]
      }]
    },
    options: {
      scales: {
        r: {
          min: 0,
          max: 15
        }
      }
    }
  });
}
</script>

</body>
</html>
