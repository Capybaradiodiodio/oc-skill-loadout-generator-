<!DOCTYPE html>
<html>
<head>
<title>Elemental Skill Builder</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    background: #111;
    color: white;
    font-family: Arial;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
}

.container {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
}

/* LEFT SIDE */
.left-panel {
    width: 60%;
}

/* RIGHT SIDE */
.right-panel {
    width: 35%;
}

/* Skill Library */
.skill-box {
    border: 1px solid #444;
    padding: 8px;
    margin: 6px;
    display: inline-block;
    width: 160px;
    background: #1a1a1a;
}

button {
    padding: 4px 8px;
    margin-top: 4px;
    cursor: pointer;
}

/* Selected Skills Bar */
#selectedBar {
    border: 1px solid white;
    padding: 10px;
    margin-bottom: 15px;
    min-height: 60px;
}

.selected-skill {
    background: #222;
    padding: 6px;
    margin: 4px;
    display: inline-block;
    border: 1px solid hotpink;
}

/* Cost Bar */
#costContainer {
    height: 20px;
    background: #333;
    margin-bottom: 10px;
    position: relative;
}

#costBar {
    height: 100%;
    width: 0%;
    background: hotpink;
    transition: 0.3s;
}

/* Chart sizing */
#radarChart {
    max-width: 300px;
    max-height: 300px;
}

#properties {
    margin-top: 10px;
    border: 1px solid #444;
    padding: 10px;
}
</style>
</head>

<body>

<h1>Elemental Skill Builder</h1>

<div class="container">

<div class="left-panel">

<h3>Selected Skills</h3>
<div id="costContainer">
    <div id="costBar"></div>
</div>
<div id="points">0 / 10</div>

<div id="selectedBar"></div>

<h3>Skill Library</h3>
<div id="skills"></div>

</div>

<div class="right-panel">

<canvas id="radarChart"></canvas>
<div id="properties">Click a skill to see properties.</div>

</div>

</div>

<script>

// CONFIG
const TOTAL_POINTS = 10;

const skills = [
{ name: "Fire 1", element: "Fire", role: "Attack", cost: 2,
  stats: { damage: 8, control: 2, defense: 1, mobility: 2, sustain: 0 } },

{ name: "Fire 2", element: "Fire", role: "Defense", cost: 2,
  stats: { damage: 1, control: 2, defense: 8, mobility: 1, sustain: 3 } },

{ name: "Water 1", element: "Water", role: "Attack", cost: 2,
  stats: { damage: 5, control: 7, defense: 2, mobility: 2, sustain: 0 } },

{ name: "Water 2", element: "Water", role: "Heal", cost: 2,
  stats: { damage: 0, control: 3, defense: 2, mobility: 1, sustain: 8 } },

{ name: "Wind 1", element: "Wind", role: "Attack", cost: 2,
  stats: { damage: 6, control: 2, defense: 1, mobility: 6, sustain: 0 } },

{ name: "Wind 2", element: "Wind", role: "Dodge", cost: 2,
  stats: { damage: 1, control: 2, defense: 1, mobility: 9, sustain: 0 } }
];

let selectedSkills = [];
let usedElements = [];

// Create Skill Library
const skillContainer = document.getElementById("skills");

skills.forEach(skill => {
    const div = document.createElement("div");
    div.className = "skill-box";
    div.innerHTML = `
        <strong>${skill.name}</strong><br>
        ${skill.element} - ${skill.role}<br>
        <button onclick="addSkill('${skill.name}')">Add</button>
    `;
    skillContainer.appendChild(div);
});

function addSkill(name) {

    const skill = skills.find(s => s.name === name);

    let extraCost = 0;
    if (!usedElements.includes(skill.element) && usedElements.length > 0) {
        extraCost = 1;
    }

    const finalCost = skill.cost + extraCost;

    if (getCurrentPoints() + finalCost > TOTAL_POINTS) {
        alert("Not enough points!");
        return;
    }

    selectedSkills.push({ ...skill, finalCost });

    if (!usedElements.includes(skill.element)) {
        usedElements.push(skill.element);
    }

    updateUI();
}

function removeSkill(index) {
    selectedSkills.splice(index, 1);

    usedElements = [...new Set(selectedSkills.map(s => s.element))];

    updateUI();
}

function getCurrentPoints() {
    return selectedSkills.reduce((sum, s) => sum + s.finalCost, 0);
}

function updateUI() {
    updateSelectedBar();
    updatePoints();
    updateChart();
}

function updateSelectedBar() {

    const bar = document.getElementById("selectedBar");
    bar.innerHTML = "";

    selectedSkills.forEach((skill, index) => {
        const div = document.createElement("div");
        div.className = "selected-skill";
        div.innerHTML = `
            ${skill.name} (${skill.finalCost})
            <button onclick="removeSkill(${index})">X</button>
        `;
        bar.appendChild(div);
    });
}

function updatePoints() {

    const current = getCurrentPoints();

    document.getElementById("points").innerText =
        current + " / " + TOTAL_POINTS;

    const percent = (current / TOTAL_POINTS) * 100;
    document.getElementById("costBar").style.width = percent + "%";
}

skillContainer.addEventListener("click", function(e) {
    if (e.target.tagName === "BUTTON") {
        const skillName = e.target.parentElement.querySelector("strong").innerText;
        const skill = skills.find(s => s.name === skillName);

        document.getElementById("properties").innerHTML = `
            <strong>${skill.name}</strong><br>
            Element: ${skill.element}<br>
            Role: ${skill.role}<br>
            Damage: ${skill.stats.damage}<br>
            Control: ${skill.stats.control}<br>
            Defense: ${skill.stats.defense}<br>
            Mobility: ${skill.stats.mobility}<br>
            Sustain: ${skill.stats.sustain}
        `;
    }
});

// Radar Chart
const ctx = document.getElementById('radarChart').getContext('2d');

const radarChart = new Chart(ctx, {
    type: 'radar',
    data: {
        labels: ['Damage', 'Control', 'Defense', 'Mobility', 'Sustain'],
        datasets: [{
            label: 'Build',
            data: [0,0,0,0,0],
            borderColor: 'hotpink',
            backgroundColor: 'rgba(255,105,180,0.2)'
        }]
    },
    options: {
        plugins: { legend: { display: false }},
        scales: {
            r: {
                beginAtZero: true,
                max: 25,
                ticks: { display: false }
            }
        }
    }
});

function updateChart() {

    const totals = { damage:0, control:0, defense:0, mobility:0, sustain:0 };

    selectedSkills.forEach(skill => {
        for (let stat in totals) {
            totals[stat] += skill.stats[stat];
        }
    });

    radarChart.data.datasets[0].data = [
        totals.damage,
        totals.control,
        totals.defense,
        totals.mobility,
        totals.sustain
    ];

    radarChart.update();
}

</script>

</body>
</html>
